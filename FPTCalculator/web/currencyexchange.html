<html>
    <head>
        <title>Currency Exchange</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
    <center><div><h2>CURRENCY EXCHANGE</h2></div></center>
    <form action="currencyexchange" method="post">
        <table>
            <tr>
                <td>Amount</td>
                <td>
                    <p><input type="text" name="amount" placeholder="Amount of money"></p>
                </td>
                <td>
                    <select name="method">
                        <option value="buy">Buy</option>
                        <option value="sell" selected>Sell</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="radio" name="moneytype" value="usd" checked>USD<br>
                    <input type="radio" name="moneytype" value="eur">EUR<br>
                    <input type="radio" name="moneytype" value="gbp">GPB
                </td>
                <td></td>
            </tr>
            <tr>
                <td></td>
                <td><input type="submit" value="Calculate"></td>
                <td></td>
            </tr>
        </table>

    </form>
</body>
</html>
